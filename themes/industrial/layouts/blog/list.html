{{ define "main" }}
<section class="blog-section">
  <div class="container">
    <h1 class="section-title">{{ .Title }}</h1>
    <p class="section-subtitle">{{ .Params.subtitle | default "Tips, guides, and industry insights" }}</p>
    <div class="blog-grid">
      {{ range .Pages }}
      <a href="{{ .RelPermalink }}" class="blog-card">
        <div class="blog-card-img"><div class="placeholder-img">📝</div></div>
        <div class="blog-card-body">
          <time class="blog-card-date">{{ .Date.Format "Jan 2, 2006" }}</time>
          <h3>{{ .Title }}</h3>
          <p>{{ .Description | default .Summary | truncate 120 }}</p>
        </div>
      </a>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
