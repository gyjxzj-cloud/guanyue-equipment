<header class="site-header">
  <div class="container header-inner">
    <a href="{{ relLangURL "" }}" class="logo">
      <span class="logo-icon">🏗️</span>
      <span class="logo-text">{{ site.Title }}</span>
    </a>
    <button class="mobile-nav-toggle" aria-label="Toggle navigation" onclick="toggleNav()">
      <span></span><span></span><span></span>
    </button>
    <nav class="main-nav">
      <ul>
        <li><a href="{{ relLangURL "" }}" {{ if .IsHome }}class="active"{{ end }}>{{ i18n "home" }}</a></li>
        <li><a href="{{ relLangURL "products/" }}" {{ if hasPrefix .RelPermalink "/products/" }}class="active"{{ end }}>{{ i18n "products" }}</a></li>
        <li><a href="{{ relLangURL "solutions/" }}" {{ if hasPrefix .RelPermalink "/solutions/" }}class="active"{{ end }}>{{ i18n "solutions" }}</a></li>
        <li><a href="{{ relLangURL "cases/" }}" {{ if hasPrefix .RelPermalink "/cases/" }}class="active"{{ end }}>{{ i18n "projects" }}</a></li>
        <li><a href="{{ relLangURL "blog/" }}" {{ if hasPrefix .RelPermalink "/blog/" }}class="active"{{ end }}>{{ i18n "blog" }}</a></li>
        <li><a href="{{ relLangURL "about/" }}" {{ if eq .RelPermalink "/about/" }}class="active"{{ end }}>{{ i18n "about" }}</a></li>
        <li><a href="{{ relLangURL "contact/" }}" class="btn btn-primary nav-cta">{{ i18n "get_quote" }}</a></li>
        <li class="lang-switcher">
          <select onchange="if(this.value) window.location.href=this.value;" class="lang-select">
            {{ range $.Site.Home.AllTranslations }}
            <option value="{{ .RelPermalink }}"{{ if eq $.Page.RelPermalink .RelPermalink }} selected{{ end }}>{{ .Language.LanguageName }}</option>
            {{ end }}
          </select>
        </li>
      </ul>
    </nav>
  </div>
</header>
