{{ define "main" }}
<section class="section">
  <div class="container">
    <h1 class="section-title">{{ .Title }}</h1>
    <p class="section-subtitle">{{ .Params.subtitle | default (i18n "explore_full_range") }}</p>
    <div class="product-grid">
      {{ range .Pages }}
      {{ $slug := .File.ContentBaseName }}
      <a href="{{ .RelPermalink }}" class="product-card">
        <div class="product-card-img" style="background:url('/images/product-{{ $slug }}.webp') center/cover no-repeat;background-color:var(--light-bg);"></div>
        <h3>{{ .Title }}</h3>
        <p>{{ .Params.subtitle }}</p>
        <div class="product-card-specs">
          <span>{{ .Params.capacity }}</span>
          <span>{{ .Params.mixer }}</span>
        </div>
        <span class="card-cta">{{ i18n "product_learn_more" }}</span>
      </a>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
